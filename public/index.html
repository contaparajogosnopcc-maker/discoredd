<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nexus Chat</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Tela de Login -->
    <div id="loginScreen" class="screen">
      <div class="login-card">
        <div class="login-icon">💬</div>
        <h1>Nexus Chat</h1>
        <p>Conecte seu Discord para conversar</p>
        <a href="/login" class="btn-discord">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.33-.35-.76-.54-1.09-.01-.02-.04-.03-.07-.03-1.5.26-2.93.71-4.27 1.33-.01 0-.02.01-.03.02-2.72 4.07-3.47 8.03-3.1 11.95 0 .02.01.04.03.05 1.8 1.32 3.53 2.12 5.24 2.65.03.01.06 0 .07-.02.4-.55.76-1.13 1.07-1.74.02-.04 0-.08-.04-.09-.57-.22-1.11-.48-1.64-.78-.04-.02-.04-.08-.01-.11.11-.08.22-.17.33-.25.02-.02.05-.02.07-.01 3.44 1.57 7.15 1.57 10.55 0 .02-.01.05-.01.07.01.11.09.22.17.33.25.04.03.04.09-.01.11-.52.31-1.07.56-1.64.78-.04.01-.05.06-.04.09.32.61.68 1.19 1.07 1.74.03.01.06.02.09.01 1.72-.53 3.45-1.33 5.25-2.65.02-.01.03-.03.03-.05.44-4.53-.73-8.46-3.1-11.95-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12 0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12 0 1.17-.83 2.12-1.89 2.12z"/></svg>
          Entrar com Discord
        </a>
      </div>
    </div>    <!-- App Principal -->    <div id="mainScreen" class="screen hidden">
      <!-- Header -->
      <header class="app-header">
        <button id="menuToggle" class="icon-btn">☰</button>
        <h2>Nexus Chat</h2>
        <div class="header-actions">
          <span id="onlineBadge" class="badge-sm">0 online</span>
          <button id="logoutBtn" class="icon-btn" title="Sair">🚪</button>
        </div>
      </header>      <!-- Conteúdo Principal -->      <div class="app-body">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-header">
            <img id="avatar" src="" class="avatar-lg">
            <div class="user-details">
              <strong id="username"></strong>
              <span id="tag" class="tag"></span>
            </div>
          </div>          <!-- Painel Admin (oculto para não-admin) -->          <div id="adminPanel" class="admin-panel hidden">
            <h4>🛡️ Admin</h4>
            <button class="admin-btn" onclick="adminClearChat()">🧹 Limpar Chat</button>
            <p class="admin-hint">Toque em um usuário para gerenciar</p>
          </div>          <h4>🟢 Online</h4>
          <div id="onlineList" class="online-list">
            <div class="empty-text">Ninguém online</div>
          </div>
        </aside>        <!-- Área do Chat -->        <main class="chat-area">
          <div id="chatMessages" class="chat-messages">
            <div class="chat-empty">
              <div class="empty-icon">💬</div>
              <p>Nenhuma mensagem ainda</p>
              <p class="empty-sub">Seja o primeiro a falar!</p>
            </div>
          </div>
          <div class="chat-input-bar">
            <input id="chatInput" type="text" placeholder="Digite sua mensagem..." maxlength="500" autocomplete="off">
            <button id="sendBtn" class="send-btn">➤</button>
          </div>
        </main>
      </div>
    </div>    <!-- Painel de Chamada -->    <div id="callPanel" class="call-panel hidden">
      <div class="call-header">
        <span>📞 Em chamada</span>
        <button id="hangupBtn" class="hangup-btn">❌</button>
      </div>
      <div class="call-videos">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
    </div>    <!-- Modal Admin -->    <div id="adminModal" class="modal-overlay hidden">
      <div class="modal-card">
        <h3>🛡️ Gerenciar</h3>
        <p id="modalUsername" class="modal-user"></p>
        <div class="modal-actions">
          <button id="modalKick" class="btn-warning">👢 Kick</button>
          <button id="modalBan" class="btn-danger">🔨 Banir</button>
          <button id="modalCall" class="btn-call">📞 Ligar</button>
        </div>
        <button id="modalClose" class="btn-cancel">Cancelar</button>
      </div>
    </div>    <!-- Status Bar -->    <div id="statusBar" class="status-bar">
      <span class="status-dot"></span>
      <span id="statusText">Conectando...</span>
    </div>
  </div>  <script src="app.js"></script></body>
</html>

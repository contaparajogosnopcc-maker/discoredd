<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nexus Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Login -->
    <div id="loginScreen" class="screen">
      <div class="login-card">
        <div class="login-icon">💬</div>
        <h1>Nexus Chat</h1>
        <p>Conecte seu Discord para conversar</p>
        <a href="/login" class="btn-discord">Entrar com Discord</a>
      </div>
    </div>    <!-- Main -->    <div id="mainScreen" class="screen hidden">
      <header class="app-header">
        <button id="menuToggle" class="icon-btn">☰</button>
        <h2>Nexus Chat</h2>
        <div class="header-actions">
          <button id="rankingBtn" class="icon-btn" title="Ranking">🏆</button>
          <button id="themeBtn" class="icon-btn" title="Tema">🎨</button>
          <span id="onlineBadge" class="badge-sm">0 online</span>
          <button id="logoutBtn" class="icon-btn">🚪</button>
        </div>
      </header>      <div class="app-body">
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-header">
            <img id="avatar" src="" class="avatar-lg">
            <div class="user-details">
              <strong id="username"></strong>
              <span id="xpBadge" class="xp-badge">Lv.1</span>
            </div>
          </div>          <div id="adminPanel" class="admin-panel hidden">
            <h4>🛡️ Admin</h4>
            <button class="admin-btn" onclick="adminClearChat()">🧹 Limpar Chat</button>
            <button class="admin-btn" onclick="openRoleManager()">👥 Gerenciar Cargos</button>
            <button class="admin-btn" onclick="openReportsPanel()">🚩 Denúncias</button>
            <button class="admin-btn" onclick="openLogsPanel()">📋 Logs</button>
          </div>          <h4>🟢 Online</h4>
          <div id="onlineList" class="online-list"><div class="empty-text">Ninguém online</div></div>
        </aside>        <main class="chat-area" id="chatArea">
          <div id="chatMessages" class="chat-messages">
            <div class="chat-empty"><div class="empty-icon">💬</div><p>Nenhuma mensagem</p></div>
          </div>
          <div class="chat-input-bar">
            <button id="attachBtn" class="attach-btn">📎</button>
            <input type="file" id="fileInput" hidden accept="image/*,.pdf,.txt,.zip">
            <input id="chatInput" type="text" placeholder="Digite sua mensagem..." maxlength="1000">
            <button id="sendBtn" class="send-btn">➤</button>
          </div>
        </main>
      </div>
    </div>    <!-- Call Panel -->    <div id="callPanel" class="call-panel hidden">
      <div class="call-header"><span>📞 Em chamada</span><button id="hangupBtn" class="hangup-btn">❌</button></div>
      <div class="call-videos"><video id="localVideo" autoplay muted playsinline></video><video id="remoteVideo" autoplay playsinline></video></div>
    </div>    <!-- Modals -->    <div id="modalOverlay" class="modal-overlay hidden"></div>
    <div id="adminModal" class="modal-card hidden">...</div>
    <div id="profileModal" class="modal-card hidden">...</div>
    <div id="settingsModal" class="modal-card hidden">...</div>
    <div id="roleManagerModal" class="modal-card hidden">...</div>
    <div id="reportsModal" class="modal-card hidden">...</div>
    <div id="logsModal" class="modal-card hidden">...</div>
    <div id="rankingModal" class="modal-card hidden">...</div>    <div id="statusBar" class="status-bar"><span class="status-dot"></span> <span id="statusText">Conectando...</span></div>
  </div>
  <script src="app.js"></script>
</body>
</html>

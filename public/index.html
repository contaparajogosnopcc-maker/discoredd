<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Chat - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="badge">🛡️ Admin</span>
      <h1>💬 Discord Chat</h1>
      <p class="sub">Bate-papo em tempo real • Comandos Admin</p>
    </header>

    <div id="loginBox" class="card">
      <div class="logo">🛡️</div>
      <h2>Conecte sua conta Discord</h2>
      <p>Entre para conversar em <strong>tempo real</strong>!</p>
      <a href="/login" class="btn">Login com Discord</a>
    </div>

    <div id="dash" class="main-layout hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img id="avatar" src="" class="avatar">
          <div><strong id="username"></strong><span id="tag" class="tag"></span></div>
          <button id="logoutBtn" class="btn-out">🚪</button>
        </div>
        <div id="adminPanel" class="admin-panel hidden">
          <h4>🛡️ Painel Admin</h4>
          <button class="admin-btn danger" onclick="adminClearChat()">🧹 Limpar Chat</button>
          <div class="admin-info">Clique em um usuário para gerenciar</div>
        </div>
        <h4>🟢 Online</h4>
        <div id="onlineList" class="online-list"><div class="loading">Carregando...</div></div>
        <div id="onlineCount" class="count"></div>
      </aside>

      <main class="chat-area">
        <div class="chat-header"><h3>💬 Chat ao Vivo</h3></div>
        <div id="chatMessages" class="chat-messages"><div class="chat-loading">Carregando...</div></div>
        <div class="chat-input-area">
          <input id="chatInput" type="text" placeholder="Digite sua mensagem..." maxlength="500">
          <button id="sendBtn" class="btn">Enviar</button>
        </div>
      </main>
    </div>

    <div id="adminModal" class="modal hidden">
      <div class="modal-content">
        <h3>🛡️ Gerenciar Usuário</h3>
        <p id="modalUsername"></p>
        <div class="modal-buttons">
          <button class="admin-btn warning" id="modalKick">👢 Kick</button>
          <button class="admin-btn danger" id="modalBan">🔨 Banir</button>
          <button class="btn" id="modalClose">Cancelar</button>
        </div>
      </div>
    </div>

    <div id="statusBar" class="status"><span class="dot"></span> <span id="statusText">Conectado</span></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
